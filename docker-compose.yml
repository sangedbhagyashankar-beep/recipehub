version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - USER_SERVICE_URL=http://user-service:5001
      - RECIPE_SERVICE_URL=http://recipe-service:5002
      - ORDER_SERVICE_URL=http://order-service:5003
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
    depends_on:
      - user-service
      - recipe-service
      - order-service
      - notification-service
    networks:
      - recipehub-network

  user-service:
    build: ./user-service
    ports:
      - '5001:5001'
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/recipehub_users
      - JWT_SECRET=your_jwt_secret_key
    depends_on:
      - mongo
    networks:
      - recipehub-network

  recipe-service:
    build: ./recipe-service
    ports:
      - '5002:5002'
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/recipehub_recipes
      - JWT_SECRET=your_jwt_secret_key
    depends_on:
      - mongo
    networks:
      - recipehub-network

  order-service:
    build: ./order-service
    ports:
      - '5003:5003'
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/recipehub_orders
      - JWT_SECRET=your_jwt_secret_key
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
    depends_on:
      - mongo
    networks:
      - recipehub-network

  notification-service:
    build: ./notification-service
    ports:
      - '5004:5004'
    environment:
      - NODE_ENV=development
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASS=your_email_password
    networks:
      - recipehub-network

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api-gateway
    networks:
      - recipehub-network

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - recipehub-network

volumes:
  mongo-data:

networks:
  recipehub-network:
    driver: bridge
